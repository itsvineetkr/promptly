version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: chatbot_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  # FastAPI Backend
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: DockerFile
      target: backend
    container_name: chatbot_backend
    restart: always
    ports:
      - "1001:8000"
    depends_on:
      - typesense
      # - mongodb
    volumes:
      - ./backend:/app/backend
    networks:
      - app-network
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: chatbot_frontend
    restart: always
    ports:
      - "1002:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    command: npm run dev -- --host 0.0.0.0

  typesense:
    image: typesense/typesense:29.0
    restart: on-failure
    environment:
      TYPESENSE_API_KEY: xyz
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command:
      - '--data-dir=/data'
      - '--api-key=xyz'
      - '--enable-cors'
    networks:
      - app-network

volumes:
  mongodb_data:
  typesense-data:
    driver: local

networks:
  app-network:
    driver: bridge